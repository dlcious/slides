<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zendesk Intelligence Assistant – Deck Presentation</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #000;
      overflow: hidden;
      cursor: pointer;
    }

    .deck-container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    .slide {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.5s ease-in-out;
      pointer-events: none;
    }

    .slide.active {
      opacity: 1;
      pointer-events: auto;
    }

    .slide img {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
    }

    /* Navigation controls */
    .nav-controls {
      position: fixed;
      bottom: 32px;
      right: 32px;
      display: flex;
      gap: 16px;
      z-index: 100;
      opacity: 0.3;
      transition: opacity 0.3s;
    }

    .nav-controls:hover {
      opacity: 1;
    }

    .nav-btn {
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      transition: background 0.2s;
      backdrop-filter: blur(10px);
    }

    .nav-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .nav-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* Slide counter */
    .slide-counter {
      position: fixed;
      bottom: 32px;
      left: 32px;
      color: rgba(255, 255, 255, 0.5);
      font-size: 14px;
      font-weight: 500;
      font-family: 'Monaco', monospace;
      z-index: 100;
    }

    /* Keyboard hint */
    .keyboard-hint {
      position: fixed;
      top: 32px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.4);
      font-size: 12px;
      z-index: 100;
      animation: fadeOut 3s forwards;
    }

    @keyframes fadeOut {
      0%, 70% { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="keyboard-hint">Use arrow keys or click to navigate</div>

  <div class="deck-container">
    <!-- Slide 1: Cover -->
    <div class="slide active" data-slide="1">
      <img src="assets/renders/cover--canonical.png" alt="Slide 1: Zendesk Intelligence Assistant">
    </div>

    <!-- Slide 2: Agenda -->
    <div class="slide" data-slide="2">
      <img src="assets/renders/agenda--canonical.png" alt="Slide 2: Agenda">
    </div>

    <!-- Slide 3: Section divider -->
    <div class="slide" data-slide="3">
      <img src="assets/renders/section-divider--canonical.png" alt="Slide 3: The support gap">
    </div>

    <!-- Slide 4: Statement -->
    <div class="slide" data-slide="4">
      <img src="assets/renders/statement--canonical.png" alt="Slide 4: Statement">
    </div>

    <!-- Slide 5: Quote -->
    <div class="slide" data-slide="5">
      <img src="assets/renders/quote--canonical.png" alt="Slide 5: Customer quote">
    </div>

    <!-- Slide 6: Content -->
    <div class="slide" data-slide="6">
      <img src="assets/renders/content--cols5-none.png" alt="Slide 6: Built on three principles">
    </div>

    <!-- Slide 7: Product plate -->
    <div class="slide" data-slide="7">
      <img src="assets/renders/product-plate--canonical.png" alt="Slide 7: Intelligence Assistant in action">
    </div>

    <!-- Slide 8: Data display -->
    <div class="slide" data-slide="8">
      <img src="assets/renders/data-display--callouts.png" alt="Slide 8: Early customer results">
    </div>

    <!-- Slide 9: Timeline -->
    <div class="slide" data-slide="9">
      <img src="assets/renders/timeline--canonical.png" alt="Slide 9: Rollout plan">
    </div>

    <!-- Slide 10: Closing -->
    <div class="slide" data-slide="10">
      <img src="assets/renders/closing--canonical.png" alt="Slide 10: Zendesk">
    </div>
  </div>

  <div class="slide-counter">
    <span id="current-slide">1</span> / <span id="total-slides">10</span>
  </div>

  <div class="nav-controls">
    <button class="nav-btn" id="prev-btn" disabled>←</button>
    <button class="nav-btn" id="next-btn">→</button>
  </div>

  <script>
    let currentSlide = 1;
    const totalSlides = 10;
    const slides = document.querySelectorAll('.slide');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const currentSlideEl = document.getElementById('current-slide');

    function updateSlide(newSlide) {
      if (newSlide < 1 || newSlide > totalSlides) return;

      // Remove active class from current slide
      slides[currentSlide - 1].classList.remove('active');

      // Update current slide
      currentSlide = newSlide;

      // Add active class to new slide
      slides[currentSlide - 1].classList.add('active');

      // Update counter
      currentSlideEl.textContent = currentSlide;

      // Update button states
      prevBtn.disabled = currentSlide === 1;
      nextBtn.disabled = currentSlide === totalSlides;
    }

    function nextSlide() {
      if (currentSlide < totalSlides) {
        updateSlide(currentSlide + 1);
      }
    }

    function prevSlide() {
      if (currentSlide > 1) {
        updateSlide(currentSlide - 1);
      }
    }

    // Click navigation
    document.querySelector('.deck-container').addEventListener('click', (e) => {
      if (e.target.closest('.nav-controls')) return;

      const rect = e.currentTarget.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const clickPosition = x / rect.width;

      if (clickPosition < 0.5) {
        prevSlide();
      } else {
        nextSlide();
      }
    });

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') {
        e.preventDefault();
        nextSlide();
      } else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
        e.preventDefault();
        prevSlide();
      } else if (e.key === 'Home') {
        e.preventDefault();
        updateSlide(1);
      } else if (e.key === 'End') {
        e.preventDefault();
        updateSlide(totalSlides);
      }
    });

    // Button navigation
    prevBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      prevSlide();
    });

    nextBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      nextSlide();
    });

    // Touch/swipe support for mobile
    let touchStartX = 0;
    let touchEndX = 0;

    document.addEventListener('touchstart', (e) => {
      touchStartX = e.changedTouches[0].screenX;
    });

    document.addEventListener('touchend', (e) => {
      touchEndX = e.changedTouches[0].screenX;
      handleSwipe();
    });

    function handleSwipe() {
      const swipeThreshold = 50;
      if (touchStartX - touchEndX > swipeThreshold) {
        nextSlide();
      } else if (touchEndX - touchStartX > swipeThreshold) {
        prevSlide();
      }
    }
  </script>
</body>
</html>
