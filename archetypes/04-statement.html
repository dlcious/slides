<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statement Archetype – Zendesk AI Slides</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #000; margin: 0; padding: 0; overflow: hidden; }
        .slide { width: 1920px; height: 1080px; background: #11110D; position: relative; padding: 30px; display: flex; align-items: center; justify-content: center; outline: 2px solid rgba(255, 255, 255, 0.3); }
        .eyebrow { position: absolute; top: 30px; left: 30px; padding: 6px 14px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 999px; font-size: 14px; font-weight: 500; color: #FFFFFF; letter-spacing: 0.05em; }
        .statement { font-size: 80px; font-weight: 600; line-height: 1.1; color: #FFFFFF; text-align: center; max-width: 1400px; letter-spacing: -0.01em; }
        .logo { position: absolute; bottom: 30px; left: 30px; width: 80px; height: 57px; }
        .footer { position: absolute; bottom: 30px; right: 30px; font-size: 14px; font-weight: 500; color: #FFFFFF; opacity: 0.75; }
        @media (max-width: 1920px) { .slide { transform: scale(0.8); } }
    </style>
</head>
<body>
    <div class="slide">
        <div class="eyebrow">[NN] · [SECTION LABEL]</div>
        <h1 class="statement">Statement body Inter Semi Bold 80pt, line height 110%, center aligned, sentence case</h1>
        <svg class="logo" viewBox="0 0 144 105" fill="none"><path d="M77.4095 104.5C77.5392 86.3085 92.3259 71.6016 110.548 71.6016C128.77 71.6016 143.556 86.3085 143.686 104.5L77.4095 104.5Z" fill="#FFF"/><path d="M143.5 0H77.5V77L143.5 0Z" fill="#FFF"/><path d="M66.2766 0C66.1468 18.1914 51.3605 32.8983 33.1385 32.8984C14.9165 32.8984 0.12976 18.1915 0 0L66.2766 0Z" fill="#FFF"/><path d="M0 104.5L66.5 104.5L66.5 27.5L0 104.5Z" fill="#FFF"/></svg>
        <div class="footer">© 2026 Zendesk, Inc. All rights reserved. Private and confidential.</div>
    </div>
</body>
</html>
