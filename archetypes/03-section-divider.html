<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Section Divider Archetype – Zendesk AI Slides</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #000; margin: 0; padding: 0; overflow: hidden; }
        .slide { width: 1920px; height: 1080px; background: #11110D; position: relative; padding: 30px; outline: 1px solid rgba(255, 255, 255, 0.1); }
        .eyebrow { position: absolute; top: 30px; left: 30px; padding: 6px 14px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 999px; font-size: 14px; font-weight: 500; color: #FFFFFF; letter-spacing: 0.05em; }
        .body-text { position: absolute; top: 120px; left: 30px; font-size: 27px; font-weight: 400; line-height: 1.3; color: #FFFFFF; max-width: 600px; }
        .headline { position: absolute; bottom: 100px; left: 30px; font-size: 160px; font-weight: 600; line-height: 0.85; color: #FFFFFF; letter-spacing: -0.02em; max-width: 1800px; }
        .footer { position: absolute; bottom: 30px; right: 30px; font-size: 14px; font-weight: 500; color: #FFFFFF; opacity: 0.75; }
        @media (max-width: 1920px) { .slide { transform: scale(0.8); } }
    </style>
</head>
<body>
    <div class="slide">
        <div class="eyebrow">[NN] · [SECTION LABEL]</div>
        <div class="body-text">Section body placeholder, Inter Reg 27pt, top-left aligned, line height 130%</div>
        <h1 class="headline">Headline — sentence case, no period,160pt</h1>
        <div class="footer">© 2026 Zendesk, Inc. All rights reserved. Private and confidential.</div>
    </div>
</body>
</html>
