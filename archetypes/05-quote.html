<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote Archetype – Zendesk AI Slides</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: transparent; margin: 0; padding: 0; overflow: hidden; }
        .slide { width: 1920px; height: 1080px; background: #FFFFFF; position: relative; padding: 30px; display: flex; gap: 60px;  }
        .eyebrow { position: absolute; top: 30px; left: 30px; padding: 6px 14px; background: rgba(112, 163, 42, 0.1); border: 1px solid rgba(112, 163, 42, 0.3); border-radius: 999px; font-size: 14px; font-weight: 500; color: #70A32A; letter-spacing: 0.05em; }
        .image-container { width: 345px; height: 926px; background: #E5E5E2; border-radius: 20px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: #11110D; font-size: 14px; text-align: center; padding: 20px; margin-top: 60px; }
        .quote-content { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 80px 40px 80px 0; }
        .quote-text { font-size: 80px; font-weight: 600; line-height: 1.1; color: #11110D; margin-bottom: 60px; letter-spacing: -0.01em; }
        .quote-text::before { content: '"'; margin-left: -0.5em; }
        .quote-text::after { content: '"'; }
        .attribution { display: flex; flex-direction: column; gap: 4px; }
        .attribution-name { font-size: 21px; font-weight: 600; color: #11110D; }
        .attribution-title { font-size: 16px; font-weight: 400; color: #11110D; opacity: 0.7; }
        .footer { position: absolute; bottom: 30px; right: 30px; font-size: 14px; font-weight: 500; color: #11110D; opacity: 0.75; }
        @media (max-width: 1920px) { .slide { transform: scale(0.8); } }
    </style>
</head>
<body>
    <div class="slide">
        <div class="eyebrow">[NN] · [SECTION LABEL]</div>
        <div class="image-container">[quote image placeholder<br>345×926px, 20px corner radius]</div>
        <div class="quote-content">
            <div class="quote-text">Quote Inter Semi Bold 80pt, line height 110%, hanging punctuation.</div>
            <div class="attribution">
                <div class="attribution-name">Name</div>
                <div class="attribution-title">Title, Company</div>
            </div>
        </div>
        <div class="footer">© 2026 Zendesk, Inc. All rights reserved. Private and confidential.</div>
    </div>
</body>
</html>
