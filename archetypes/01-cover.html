<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cover Archetype – Zendesk AI Slides</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #000; margin: 0; padding: 0; overflow: hidden; }
        .slide { width: 1920px; height: 1080px; background: #FFFFFF; position: relative; padding: 30px; display: flex;  }
        .eyebrow { position: absolute; top: 30px; left: 30px; padding: 6px 14px; background: rgba(112, 163, 42, 0.1); border: 1px solid rgba(112, 163, 42, 0.3); border-radius: 999px; font-size: 14px; font-weight: 500; color: #70A32A; letter-spacing: 0.05em; }
        .content { flex: 1; display: flex; flex-direction: column; padding-right: 60px; position: relative; }
        .headline { font-size: 140px; font-weight: 600; line-height: 0.85; letter-spacing: -0.02em; color: #70A32A; margin-top: 140px; max-width: 900px; }
        .speaker { position: absolute; bottom: 80px; left: 0; display: flex; align-items: center; gap: 20px; }
        .speaker-avatar { width: 165px; height: 165px; border-radius: 50%; background: #E5E5E2; }
        .speaker-info { display: flex; flex-direction: column; gap: 4px; }
        .speaker-name { font-size: 21px; font-weight: 600; color: #11110D; }
        .speaker-title { font-size: 16px; font-weight: 400; color: #11110D; opacity: 0.7; }
        .image-container { width: 755px; height: 926px; background: #E5E5E2; border-radius: 20px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px; color: #11110D; font-size: 15px; margin-top: 60px; }
        .logo { position: absolute; bottom: 124px; left: 1045px; width: 125px; height: auto; }
        .footer { position: absolute; bottom: 30px; right: 30px; font-size: 14px; font-weight: 500; color: #11110D; opacity: 0.75; text-align: right; }
        @media (max-width: 1920px) { .slide { transform: scale(0.8); } }
    </style>
</head>

        <div class="eyebrow">[NN] · [SECTION LABEL]</div>
        <div class="content">
            <h1 class="headline">Headline — sentence case, no period, 140pt</h1>
            <div class="speaker">
                <div class="speaker-avatar"></div>
                <div class="speaker-info">
                    <div class="speaker-name">Name</div>
                    <div class="speaker-title">Title, Company</div>
                </div>
            </div>
        </div>
